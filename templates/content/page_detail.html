{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page.title }} - {{ block.super }}{% endblock %}
{% block meta_description %}{{ page.meta_description }}{% endblock %}

{% block content %}
<section class="relative h-[200px] lg:h-[300px] overflow-hidden flex items-center">
    <div class="absolute inset-0 z-0">
        <img src="https://cdn.pixabay.com/photo/2022/04/19/03/50/science-doodles-7141847_1280.jpg" 
             alt="University Gallery" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-[#0F1D40]/90 to-transparent"></div>
    </div>

    <div class="max-w-[1240px] mx-auto px-6 lg:px-8 relative z-10 w-full">
        <div class="reveal-up">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">{{ page.title }}</h1>
            <nav class="flex text-white/70 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <span class="mx-2">/</span>
                <span class="text-white">{{ page.title }}</span>
            </nav>
        </div>
    </div>
</section>
<section class="py-6 bg-white">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 max-w-4xl">
        <div class="prose prose-lg max-w-none">
            {{ page.content|safe }}
        </div>
    </div>
</section>
{% endblock %}
