{% extends 'base.html' %}
{% load static %}

{% block title %}Spring Semester Welcome Day 2026 | Presidency University{% endblock %}

{% block content %}
<!-- Standard Academic Hero Header Flattened -->
<section class="relative h-[200px] lg:h-[300px] overflow-hidden flex items-center">
    <div class="absolute inset-0 z-0">
        <img src="https://www.bracu.ac.bd/sites/default/files/styles/banner_dept_landing/public/banner-images/2024/12/31/Departments.JPG" 
             alt="University Gallery" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-[#0F1D40]/90 to-transparent"></div>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 lg:px-8 relative z-10 w-full">
        <div class="reveal-up">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">University Gallery</h1>
            <nav class="flex text-white/70 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <span class="mx-2">/</span>
                <span class="text-white">Gallery</span>
            </nav>
        </div>
    </div>
</section>

<div class="py-16 md:py-24 bg-white" x-data="{
    event: {
        title: 'Spring Semester Welcome Day 2026',
        date: 'January 15, 2026',
        description: 'Presidency University organized a colourful and vibrant orientation program to welcome the newly admitted students of the Spring 2026 semester.',
        images: [
            { url: 'https://images.unsplash.com/photo-1523050335392-93851179ae22?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 01' },
            { url: 'https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 02' },
            { url: 'https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 03' },
            { url: 'https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 04' },
            { url: 'https://images.unsplash.com/photo-1525921429624-479b6a26d84d?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 05' },
            { url: 'https://images.unsplash.com/photo-1560523182-772013f389fb?q=80&w=1200&auto=format&fit=crop', alt: 'Orientation Day 06' }
        ]
    }
}">
    <div class="max-w-[1200px] mx-auto px-6 lg:px-8">
        <div class="mb-12 reveal-up">
            <div class="flex items-center gap-2 text-[var(--primary)] font-bold text-sm uppercase tracking-widest mb-4">
                <i data-lucide="calendar" class="w-4 h-4"></i>
                <span x-text="event.date"></span>
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold text-[#0F1D40] mb-6 leading-tight" x-text="event.title"></h1>
            <p class="text-lg text-gray-600 max-w-3xl leading-relaxed" x-text="event.description"></p>
        </div>

        <!-- Masonry Grid Layout -->
        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6 reveal-up">
            <template x-for="(image, index) in event.images" :key="index">
                <div class="break-inside-avoid">
                    <div class="relative group cursor-pointer overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all duration-500 bg-gray-100">
                        <img :src="image.url" 
                             :alt="image.alt"
                             class="w-full h-auto object-cover transition-transform duration-700 group-hover:scale-105">
                        
                        <!-- Overlay -->
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="absolute bottom-6 left-6 right-6">
                                <p class="text-white font-bold text-sm" x-text="image.alt"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Navigation -->
        <div class="mt-20 pt-12 border-t border-gray-100 flex justify-between items-center reveal-up">
            <a href="/gallery" class="flex items-center gap-3 text-[#0F1D40] font-black uppercase tracking-[0.2em] text-[11px] group">
                <div class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center group-hover:bg-[#0F1D40] group-hover:text-white transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </div>
                Back to Gallery
            </a>
            <div class="flex items-center gap-4">
                <span class="text-gray-400 text-[11px] font-bold uppercase tracking-widest">Share this album</span>
                <div class="flex gap-2">
                    <a href="#" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-[#1877F2] hover:text-white transition-all"><i data-lucide="facebook" class="w-4 h-4"></i></a>
                    <a href="#" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-[#1DA1F2] hover:text-white transition-all"><i data-lucide="twitter" class="w-4 h-4"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
