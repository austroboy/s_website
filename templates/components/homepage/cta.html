<!-- ==================== CALL TO ACTION ==================== -->
<section class="py-16 md:py-24 relative overflow-hidden border-t border-[var(--border)]">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 z-0">
        <img src="https://plus.unsplash.com/premium_vector-1720145422585-4969b344c2c0" 
             alt="Background Pattern" 
             class="w-full h-full object-cover ">
        <div class="absolute inset-0 "></div>
    </div>

    <!-- Decorative Accents -->
    <div class="absolute top-0 right-0 w-[400px] h-[400px] rounded-full opacity-[0.03] z-1" style="background: radial-gradient(circle, var(--accent) 0%, transparent 70%);"></div>
    <div class="absolute bottom-0 left-0 w-[300px] h-[300px] rounded-full opacity-[0.03] z-1" style="background: radial-gradient(circle, var(--primary) 0%, transparent 70%);"></div>

    <div class="max-w-[1000px] mx-auto px-6 lg:px-8 relative z-10 text-center reveal-up">
        
        <h2 class="text-3xl md:text-5xl font-extrabold text-[var(--text)] tracking-tight mb-4 leading-tight">
            {{ section.title }}
        </h2>
        
        {% if section.subtitle %}
        <p class="text-[var(--text-muted)] text-base md:text-lg mb-8 max-w-2xl mx-auto">
            {{ section.subtitle }}
        </p>
        {% endif %}

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            {% if section.config.primary_link %}
            <a href="{{ section.config.primary_link }}" class="btn-primary-blue text-sm px-8 py-3.5 w-full sm:w-auto  hover:-translate-y-1 text-white hover:text-white transition-all duration-300">
                {{ section.config.primary_text|default:"Get Started" }}
                <i data-lucide="arrow-right" class="w-4 h-4 ml-2 inline"></i>
            </a>
            {% endif %}

            {% if section.config.secondary_link %}
            <a href="{{ section.config.secondary_link }}" class="btn-outline-blue text-sm px-8 py-3 w-full sm:w-auto hover:bg-[var(--surface-alt)] transition-colors duration-300">
                {{ section.config.secondary_text|default:"Learn More" }}
            </a>
            {% endif %}
        </div>

    </div>
</section>
