<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="w-full h-full" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-{{ svg_id|default:'placeholder' }}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--secondary)"/>
      <stop offset="100%" stop-color="var(--primary-dark)"/>
    </linearGradient>
    <linearGradient id="accent-{{ svg_id|default:'placeholder' }}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--primary-light)"/>
      <stop offset="100%" stop-color="var(--primary)"/>
    </linearGradient>
    <linearGradient id="glow-{{ svg_id|default:'placeholder' }}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" style="fill: url(#bg-{{ svg_id|default:'placeholder' }})"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="var(--surface)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="90" r="120" style="fill: url(#glow-{{ svg_id|default:'placeholder' }})"/>
  <circle cx="120" cy="420" r="80" style="fill: url(#glow-{{ svg_id|default:'placeholder' }})"/>

  <!-- Graduation cap icon -->
  <g transform="translate(400, 195)" opacity="0.95">
    <polygon points="0,-45 75,0 0,22 -75,0" style="fill: url(#accent-{{ svg_id|default:'placeholder' }})" opacity="0.9"/>
    <polygon points="0,-65 85,-12 0,16 -85,-12" style="fill: var(--primary-light)"/>
    <line x1="0" y1="-65" x2="55" y2="-45" style="stroke: var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="55" cy="-45" r="5" style="fill: var(--accent)"/>
    <line x1="55" y1="-40" x2="55" y2="-25" style="stroke: var(--accent)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-50,5 Q-50,40 -35,50" style="stroke: var(--primary-light)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M50,5 Q50,40 35,50" style="stroke: var(--primary-light)" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Open book -->
  <g transform="translate(400, 275)" opacity="0.85">
    <path d="M-5,0 Q-40,-8 -55,5 L-55,35 Q-40,22 -5,30 Z" style="fill: var(--surface)" opacity="0.9"/>
    <path d="M5,0 Q40,-8 55,5 L55,35 Q40,22 5,30 Z" style="fill: var(--surface)" opacity="0.75"/>
    <line x1="0" y1="-2" x2="0" y2="32" style="stroke: var(--primary-light)" stroke-width="2" opacity="0.5"/>
    <line x1="-15" y1="8" x2="-45" y2="12" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
    <line x1="-15" y1="15" x2="-45" y2="19" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
    <line x1="-15" y1="22" x2="-42" y2="25" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
    <line x1="15" y1="8" x2="45" y2="12" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
    <line x1="15" y1="15" x2="45" y2="19" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
    <line x1="15" y1="22" x2="42" y2="25" style="stroke: var(--primary-dark)" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Image icon hint -->
  <g transform="translate(400, 350)" opacity="0.35">
    <rect x="-18" y="-14" width="36" height="28" rx="3" style="stroke: var(--surface)" stroke-width="1.5" fill="none"/>
    <circle cx="-7" cy="-5" r="3.5" style="stroke: var(--surface)" stroke-width="1.2" fill="none"/>
    <polyline points="-14,10 -4,0 4,8 8,4 14,10" style="stroke: var(--surface)" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots -->
  <g fill="var(--primary-light)" opacity="0.12">
    <circle cx="60" cy="60" r="3"/>
    <circle cx="80" cy="60" r="3"/>
    <circle cx="100" cy="60" r="3"/>
    <circle cx="60" cy="80" r="3"/>
    <circle cx="80" cy="80" r="3"/>
    <circle cx="100" cy="80" r="3"/>
    <circle cx="60" cy="100" r="3"/>
    <circle cx="80" cy="100" r="3"/>
    <circle cx="100" cy="100" r="3"/>
    <circle cx="700" cy="400" r="3"/>
    <circle cx="720" cy="400" r="3"/>
    <circle cx="740" cy="400" r="3"/>
    <circle cx="700" cy="420" r="3"/>
    <circle cx="720" cy="420" r="3"/>
    <circle cx="740" cy="420" r="3"/>
    <circle cx="700" cy="440" r="3"/>
    <circle cx="720" cy="440" r="3"/>
    <circle cx="740" cy="440" r="3"/>
  </g>

  <!-- Bottom edge -->
  <rect x="0" y="494" width="800" height="6" style="fill: var(--primary)" opacity="0.5"/>
</svg>
