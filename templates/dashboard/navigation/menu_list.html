{% extends "dashboard_base.html" %}

{% block content %}

<div class="mb-6">
  <h1 class="text-2xl font-display font-bold text-white">Menus</h1>
</div>

<form method="post" class="mb-6 bg-base-800 p-6 rounded-2xl border border-base-700">
  {% csrf_token %}
  <input type="hidden" name="action" value="create">

  <div class="grid grid-cols-2 gap-4">
    <input type="text" name="name" placeholder="Menu Name"
      class="bg-base-900 border border-base-700 px-3 py-2 rounded-xl text-white">
    <select name="slug" class="bg-base-900 border border-base-700 px-3 py-2 rounded-xl text-white">
      <option value="header">Header</option>
      <option value="footer">Footer</option>
    </select>
  </div>

  <button class="mt-4 px-4 py-2 bg-gold text-base-900 font-bold rounded-xl">
    Create Menu
  </button>
</form>

<div class="space-y-3">
  {% for menu in menus %}
  <div class="bg-base-800 border border-base-700 p-4 rounded-xl flex justify-between">
    <div>
      <p class="text-white font-semibold">{{ menu.name }}</p>
      <p class="text-xs text-slate-muted">{{ menu.slug }}</p>
    </div>

    <a href="{% url 'navigation:menu_item_manager' menu.id %}"
       class="px-3 py-1 bg-gold/10 text-gold rounded-lg text-sm">
       Manage Items
    </a>
  </div>
  {% endfor %}
</div>

{% endblock %}
