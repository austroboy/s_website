<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-950">

  <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-lg border border-gray-800">

    <h2 class="text-2xl font-bold text-white text-center mb-6">
      Login
    </h2>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg bg-red-500/20 text-red-400 text-sm">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">
          Username
        </label>
        <input type="text"
               name="username"
               required
               class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
      </div>

      <!-- Password -->
      <div class="mb-6 relative">
        <label class="block text-sm text-gray-400 mb-1">
          Password
        </label>

        <input type="password"
               name="password"
               id="password"
               required
               class="w-full px-4 py-2 pr-12 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">

        <!-- Eye Button -->
        <button type="button"
                onclick="togglePassword()"
                class="absolute right-3 top-9 text-gray-400 hover:text-white">
          👁
        </button>
      </div>

      <button type="submit"
              class="w-full py-2 bg-yellow-500 hover:bg-yellow-400 text-black font-semibold rounded-xl transition">
        Sign In
      </button>

    </form>
  </div>

  <script>
    function togglePassword() {
      const passwordField = document.getElementById("password");
      if (passwordField.type === "password") {
        passwordField.type = "text";
      } else {
        passwordField.type = "password";
      }
    }
  </script>

</body>
</html>
