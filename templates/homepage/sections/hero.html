{% load static %}

<section x-data="{
    currentIndex: 0,
    images: [
        {% for image in hero_data.images %}
        { url: '{{ image.url }}', alt: '{{ image.alt }}' }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ],
    init() {
        setInterval(() => {
            this.currentIndex = (this.currentIndex + 1) % this.images.length;
        }, 5000);
    }
}" class="relative w-full h-[55vh] md:h-[85vh] lg:h-screen overflow-hidden">

    <!-- Image Slider -->
    <template x-for="(image, index) in images" :key="index">
        <div x-show="currentIndex === index"
             x-transition:enter="transition ease-out duration-1000"
             x-transition:enter-start="opacity-0 scale-105"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-1000"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="absolute inset-0">
            <img :src="image.url" :alt="image.alt" class="w-full h-full object-cover">
        </div>
    </template>

    <!-- Overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-[var(--surface)]/90 via-[var(--surface)]/40 to-transparent"></div>
    <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-[var(--surface)]/80 to-transparent"></div>

    <!-- Decorative Elements -->
    <div class="deco-circle w-[300px] h-[300px] -bottom-32 -left-32 animate-float-slow opacity-20 bg-[var(--primary)]"></div>
    <div class="deco-circle w-[200px] h-[200px] top-20 -right-20 animate-float opacity-20 bg-[var(--secondary)]"></div>
    
    <!-- Spinning Ring Decoration -->
    <div class="absolute top-1/2 right-[8%] -translate-y-1/2 w-[400px] h-[400px] hidden xl:block opacity-[0.1] animate-spin-slow">
        <div class="w-full h-full rounded-full border-2 border-dashed border-[var(--primary)]/50"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 w-full h-full flex flex-col justify-center items-center md:items-start px-6 md:px-16 lg:px-24 text-center md:text-left">
        <div class="max-w-3xl space-y-6 md:space-y-8 flex flex-col items-center md:items-start reveal-up">
            
            <!-- Eyebrow -->
            <div class="flex items-center space-x-2 animate-fade-in-down">
                <div class="w-10 h-[2px] bg-[var(--accent)]"></div>
                <span class="text-[var(--accent)] text-xs font-bold tracking-[0.2em] uppercase">{{ hero_data.eyebrow }}</span>
            </div>

            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-7xl font-extrabold text-[var(--text)] leading-[1.05] tracking-tight animate-fade-in-up">
                {{ hero_data.title_main }} <br />
                <span class="text-gradient">{{ hero_data.title_gradient }}</span>
            </h1>

            <p class="text-[var(--text-muted)] text-sm md:text-base lg:text-lg max-w-xl leading-relaxed animate-fade-in-up hidden md:block">
                {{ hero_data.description }}
            </p>

            <div class="flex flex-col sm:flex-row gap-4 items-center md:items-start w-full sm:w-auto animate-fade-in-up">
                <a href="#" class="btn-primary text-sm h-12 px-8 rounded-lg w-full sm:w-auto shadow-lg flex items-center justify-center">
                    <i data-lucide="pen-line" class="w-4 h-4 mr-2"></i>Apply for Admission
                </a>

                <a href="#" class="btn-outline text-sm h-12 px-8 rounded-lg w-full sm:w-auto bg-[var(--surface)]/50 backdrop-blur flex items-center justify-center">
                    <i data-lucide="globe" class="w-4 h-4 mr-2 opacity-70"></i>
                    International Applicants
                </a>
            </div>
        </div>
    </div>

    <!-- Indicators -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 md:left-24 md:translate-x-0 z-20 flex items-center space-x-3">
        <template x-for="(image, index) in images" :key="index">
            <button @click="currentIndex = index"
                    class="h-1.5 transition-all duration-500 rounded-full"
                    :class="currentIndex === index ? 'w-10 bg-[var(--primary)] shadow-[0_0_12px_var(--primary)]' : 'w-4 bg-[var(--border)] hover:bg-[var(--primary)]/50'"></button>
        </template>
    </div>

</section>
