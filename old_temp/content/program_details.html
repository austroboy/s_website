{% extends 'base.html' %}
{% load static %}

{% block title %}Bachelor of Business Administration (BBA) | Presidency University{% endblock %}

{% block content %}
<!-- Standard Academic Hero Header Flattened -->
<section class="relative h-[200px] lg:h-[300px] overflow-hidden flex items-center">
    <div class="absolute inset-0 z-0">
        <img src="https://www.bracu.ac.bd/sites/default/files/styles/banner_dept_landing/public/banner-images/2024/12/31/Departments.JPG" 
             alt="Bachelor of Business Administration" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-[#0F1D40]/90 to-transparent"></div>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 lg:px-8 relative z-10 w-full">
        <div class="reveal-up">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">Bachelor of Business Administration</h1>
            <nav class="flex text-white/70 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <span class="mx-2">/</span>
                <a href="/programs" class="hover:text-white transition-colors">Programs</a>
                <span class="mx-2">/</span>
                <span class="text-white">BBA</span>
            </nav>
        </div>
    </div>
</section>

<!-- Program Content Layout Flattened -->
<section class="bg-white py-12 md:py-20 relative overflow-hidden" x-data="{
    activeSection: 'overview',
    sections: [
        { id: 'overview', title: 'Program Overview', content: '<p>The Bachelor of Business Administration (BBA) program at Presidency University is designed to prepare students for leadership roles in the global business environment. The program provides a solid foundation in core business disciplines while allowing for specialization in areas such as Finance, Marketing, Human Resource Management, and Accounting.</p><p>Our curriculum combines theoretical knowledge with practical applications, ensuring that graduates are well-equipped to meet the challenges of the modern marketplace.</p>' },
        { id: 'curriculum', title: 'Curriculum Structure', content: '<p>The BBA program requires the completion of 124 credits, typically distributed over 8 semesters (4 years). The curriculum includes General Education courses, Core Business courses, Major courses, and Electives.</p><ul><li>General Education: 27 Credits</li><li>Core Business: 63 Credits</li><li>Major Courses: 18 Credits</li><li>Electives/Open Electives: 16 Credits</li></ul>' },
        { id: 'opportunities', title: 'Career Opportunities', content: '<p>Graduates of the BBA program find successful careers in various sectors, including Banking, Telecommunications, MNCs, and Entrepreneurial ventures. Roles include Financial Analyst, Marketing Executive, HR Specialist, and Operations Manager.</p>' }
    ],
    scrollToSection(id) {
        this.activeSection = id;
        const el = document.getElementById(id);
        if(el) {
            const yOffset = -120;
            const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
        }
    }
}">
    
    <div class="max-w-[1200px] mx-auto px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row gap-12 lg:gap-16 items-start">
            
            <!-- Left Sidebar Navigation -->
            <div class="w-full lg:w-[30%] lg:sticky lg:top-24 shrink-0">
                <nav class="flex flex-col gap-2 relative pl-4">
                    <div class="absolute left-0 top-2 bottom-2 w-px bg-gray-200"></div>
                    
                    <template x-for="section in sections" :key="section.id">
                        <button @click="scrollToSection(section.id)"
                                :class="activeSection === section.id ? 'text-[var(--primary)] font-bold' : 'text-[var(--secondary)] hover:text-[var(--primary)]'"
                                class="text-left text-sm py-2.5 px-3 transition-all duration-300 relative group">
                                
                            <div class="absolute left-[-16.5px] top-1/2 -translate-y-1/2 w-2 h-2 rounded-full transition-colors duration-300"
                                 :class="activeSection === section.id ? 'bg-[var(--primary)]' : 'bg-gray-300 group-hover:bg-[var(--primary)]/50'"></div>
                                 
                            <span x-text="section.title"></span>
                        </button>
                    </template>
                </nav>
            </div>

            <!-- Right Content Area -->
            <div class="w-full lg:w-[70%]">
                <h2 class="text-3xl lg:text-4xl font-extrabold text-[var(--secondary)] mb-12">Bachelor of Business Administration (BBA)</h2>

                <div class="space-y-12 lg:space-y-16">
                    <template x-for="(section, index) in sections" :key="section.id">
                        <div :id="section.id" class="scroll-mt-32">
                            <h3 class="text-2xl font-bold text-[var(--secondary)] mb-6" x-text="section.title"></h3>
                            <div class="prose max-w-none text-[var(--text-muted)] text-[15px] leading-relaxed" x-html="section.content"></div>
                            <hr x-show="index < sections.length - 1" class="mt-12 lg:mt-16 border-gray-200/80">
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
