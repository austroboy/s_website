{% extends 'base.html' %}
{% load static %}

{% block title %}Gallery | Experience University Life{% endblock %}

{% block content %}
<!-- Standard Academic Hero Header Flattened -->
<section class="relative h-[200px] lg:h-[300px] overflow-hidden flex items-center">
    <div class="absolute inset-0 z-0">
        <img src="https://www.bracu.ac.bd/sites/default/files/styles/banner_dept_landing/public/banner-images/2024/12/31/Departments.JPG" 
             alt="Experience University Life" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-[#0F1D40]/90 to-transparent"></div>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 lg:px-8 relative z-10 w-full">
        <div class="reveal-up">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">Experience University Life</h1>
            <nav class="flex text-white/70 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <span class="mx-2">/</span>
                <span class="text-white">Multimedia</span>
            </nav>
        </div>
    </div>
</section>

<section x-data="{
    gallery: [
        { id: 1, title: 'Guest Lecture', date: '21 Jul', image_url: 'https://images.unsplash.com/photo-1475721027785-f74ecd5ed996?q=80&w=600&auto=format&fit=crop', gridClass: 'col-span-1 row-span-1', slug: 'guest-lecture' },
        { id: 2, title: 'Cultural Performance', date: '15 Jul', image_url: 'https://images.unsplash.com/photo-1528605248644-14dd04022da1?q=80&w=600&auto=format&fit=crop', gridClass: 'col-span-1 row-span-1', slug: 'cultural-performance' },
        { id: 3, title: 'Student Portrait', date: '28 Jun', image_url: 'https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=800&auto=format&fit=crop', gridClass: 'col-span-1 row-span-2', slug: 'student-portrait' },
        { id: 4, title: 'Awards Ceremony 2026', date: '10 Jun', image_url: 'https://images.unsplash.com/photo-1523580494863-6f303125d906?q=80&w=1200&auto=format&fit=crop', gridClass: 'col-span-2 row-span-1', slug: 'awards-ceremony-2026' },
        { id: 5, title: 'Inspiring Session', date: '24 Apr', image_url: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=1200&auto=format&fit=crop', gridClass: 'col-span-2 row-span-1', slug: 'inspiring-session' },
        { id: 6, title: 'Grand Iftar', date: '14 Mar', image_url: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=600&auto=format&fit=crop', gridClass: 'col-span-1 row-span-1', slug: 'grand-iftar' },
        { id: 7, title: 'Presidency Day', date: '02 Jan', image_url: 'https://images.unsplash.com/photo-1454165833772-d996d49513d7?q=80&w=600&auto=format&fit=crop', gridClass: 'col-span-1 row-span-1', slug: 'presidency-day' }
    ]
}" class="py-12 md:py-20 bg-[var(--surface-alt)] relative overflow-hidden">
    <!-- Decorative -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full opacity-[0.02]" style="background: radial-gradient(circle, var(--primary) 0%, transparent 70%);"></div>

    <div class="max-w-[1200px] mx-auto px-6 lg:px-8 relative z-10 reveal-up">
        
        <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-10 gap-4">
            <div class="space-y-2">
                <div class="section-eyebrow">
                    <i data-lucide="image" class="w-4 h-4 text-[var(--primary)]"></i>
                    <span>Multimedia</span>
                </div>
                <h2 class="text-2xl md:text-4xl lg:text-5xl font-extrabold text-[var(--text)] tracking-tight">Photo Gallery</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-5 h-[600px] md:h-[800px] lg:h-[1000px]">
            <template x-for="item in gallery" :key="item.id">
                <a :href="'/gallery/' + item.slug" 
                   :class="item.gridClass + ' group relative overflow-hidden rounded-2xl cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-500 glow-border-hover'">
                    
                    <img :src="item.image_url" :alt="item.title" class="w-full h-full object-cover transition-transform duration-[1200ms] group-hover:scale-110">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-[var(--secondary)]/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                    <!-- Date Badge -->
                    <div class="absolute top-4 right-4 bg-white/95 backdrop-blur-md rounded-lg p-2 shadow-lg flex flex-col items-center min-w-[50px] transition-all duration-500 translate-y-[-120%] group-hover:translate-y-0 opacity-0 group-hover:opacity-100 border border-gray-100/50">
                        <span class="text-lg font-extrabold text-[var(--secondary)] leading-none text-center" x-text="item.date.split(' ')[0]"></span>
                        <span class="text-[10px] font-bold text-[var(--primary)] uppercase tracking-tighter mt-0.5" x-text="item.date.split(' ')[1]"></span>
                    </div>

                    <!-- Floating Title -->
                    <div class="absolute bottom-0 left-0 p-5 w-full transform translate-y-6 group-hover:translate-y-0 transition-transform duration-500 opacity-0 group-hover:opacity-100 text-white">
                        <div class="w-6 h-1 bg-[var(--primary)] mb-2 rounded-full"></div>
                        <h4 class="text-xs md:text-base font-bold leading-tight drop-shadow-lg" x-text="item.title"></h4>
                    </div>

                    <div class="absolute inset-x-[-100%] inset-y-0 bg-gradient-to-r from-transparent via-white/10 to-transparent skew-x-[-20deg] duration-[1600ms] group-hover:inset-x-[200%] transition-all pointer-events-none"></div>
                </a>
            </template>
        </div>
        
    </div>
</section>
{% endblock %}
