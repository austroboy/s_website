{% extends 'base.html' %}
{% load static %}

{% block title %}Admissions Overview | Presidency University{% endblock %}

{% block content %}
<!-- Standard Academic Hero Header Flattened -->
<section class="relative h-[200px] lg:h-[300px] overflow-hidden flex items-center">
    <div class="absolute inset-0 z-0">
        <img src="https://www.bracu.ac.bd/sites/default/files/styles/banner_dept_landing/public/banner-images/2024/12/31/Departments.JPG" 
             alt="Admissions" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-[#0F1D40]/90 to-transparent"></div>
    </div>

    <div class="max-w-[1200px] mx-auto px-6 lg:px-8 relative z-10 w-full">
        <div class="reveal-up">
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white mb-4">Admissions</h1>
            <nav class="flex text-white/70 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <span class="mx-2">/</span>
                <span class="text-white">Admissions</span>
            </nav>
        </div>
    </div>
</section>

<!-- Admissions Content Layout Flattened -->
<section class="bg-white py-12 md:py-20 relative overflow-hidden" x-data="{
    activeSection: 'requirements',
    sections: [
        { id: 'requirements', title: 'General Requirements', type: 'text', content: '<p>Admission to Presidency University is competitive and based on academic merit. General requirements include a minimum GPA in SSC and HSC (or equivalent) for undergraduate applicants, and a minimum CGPA for graduate applicants.</p><p>International students must also demonstrate English language proficiency through TOEFL/IELTS or equivalent examinations.</p>' },
        { id: 'process', title: 'Application Process', type: 'text', content: '<p>The application process is entirely online. Applicants must register, fill out the application form, upload required documents, and pay the application fee.</p><ol><li>Register for an account</li><li>Fill in personal and academic details</li><li>Upload documents</li><li>Pay application fee</li><li>Submit application</li></ol>' },
        { id: 'inquiry', title: 'Admission Inquiry', type: 'form' }
    ],
    scrollToSection(id) {
        this.activeSection = id;
        const el = document.getElementById(id);
        if(el) {
            const yOffset = -120;
            const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
        }
    }
}">
    
    <div class="max-w-[1200px] mx-auto px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row gap-12 lg:gap-16 items-start">
            
            <!-- Left Sidebar Navigation -->
            <div class="w-full lg:w-[30%] lg:sticky lg:top-24 shrink-0">
                <nav class="flex flex-col gap-2 relative pl-4">
                    <div class="absolute left-0 top-2 bottom-2 w-px bg-gray-200"></div>
                    
                    <template x-for="section in sections" :key="section.id">
                        <button @click="scrollToSection(section.id)"
                                :class="activeSection === section.id ? 'text-[var(--primary)] font-bold' : 'text-[var(--secondary)] hover:text-[var(--primary)]'"
                                class="text-left text-sm py-2.5 px-3 transition-all duration-300 relative group">
                                
                            <div class="absolute left-[-16.5px] top-1/2 -translate-y-1/2 w-2 h-2 rounded-full transition-colors duration-300"
                                 :class="activeSection === section.id ? 'bg-[var(--primary)]' : 'bg-gray-300 group-hover:bg-[var(--primary)]/50'"></div>
                                 
                            <span x-text="section.title"></span>
                        </button>
                    </template>
                </nav>
            </div>

            <!-- Right Content Area -->
            <div class="w-full lg:w-[70%]">
                <h2 class="text-3xl lg:text-4xl font-extrabold text-[var(--secondary)] mb-12">Admissions Overview</h2>

                <div class="space-y-12 lg:space-y-16">
                    <template x-for="(section, index) in sections" :key="section.id">
                        <div :id="section.id" class="scroll-mt-32">
                            <h3 class="text-2xl font-bold text-[var(--secondary)] mb-6" x-text="section.title"></h3>
                            
                            <div class="prose max-w-none text-[var(--text-muted)] text-[15px] leading-relaxed">
                                <template x-if="section.type === 'text'">
                                    <div x-html="section.content"></div>
                                </template>
                                
                                <template x-if="section.type === 'form'">
                                    <div class="bg-[var(--surface-alt)] p-6 md:p-8 rounded-2xl border border-gray-100">
                                        <form class="space-y-6">
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="space-y-2">
                                                    <label class="text-sm font-bold text-[var(--secondary)]">Full Name</label>
                                                    <input type="text" placeholder="Your Full Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/20 outline-none transition-all">
                                                </div>
                                                <div class="space-y-2">
                                                    <label class="text-sm font-bold text-[var(--secondary)]">Email Address</label>
                                                    <input type="email" placeholder="email@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/20 outline-none transition-all">
                                                </div>
                                            </div>
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="space-y-2">
                                                    <label class="text-sm font-bold text-[var(--secondary)]">Phone Number</label>
                                                    <input type="tel" placeholder="+880" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/20 outline-none transition-all">
                                                </div>
                                                <div class="space-y-2">
                                                    <label class="text-sm font-bold text-[var(--secondary)]">Program of Interest</label>
                                                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/20 outline-none transition-all bg-white">
                                                        <option value="">Select Program</option>
                                                        <option value="bba">BBA</option>
                                                        <option value="cse">CSE</option>
                                                        <option value="eee">EEE</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="space-y-2">
                                                <label class="text-sm font-bold text-[var(--secondary)]">Message (Optional)</label>
                                                <textarea rows="4" placeholder="How can we help you?" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/20 outline-none transition-all"></textarea>
                                            </div>
                                            <button type="button" class="w-full bg-[var(--primary)] text-white font-bold py-4 rounded-xl hover:bg-[var(--primary-dark)] transition-all shadow-lg hover:shadow-[var(--primary)]/20">
                                                Submit Inquiry
                                            </button>
                                        </form>
                                    </div>
                                </template>
                            </div>
                            
                            <hr x-show="index < sections.length - 1" class="mt-12 lg:mt-16 border-gray-200/80">
                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
